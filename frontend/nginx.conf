server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Proxy API requests to backend gateway
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # (Tùy chọn) Truyền Trace Context qua Header để nối Trace Frontend -> Backend
        proxy_pass_request_headers on;
    }

    # 2. --- BỔ SUNG PROXY CHO OPENTELEMETRY TRACING ---
    # H hứng request gửi trace từ trình duyệt và đẩy vào OTel Collector nội bộ
    location /v1/traces {
        proxy_pass http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces;
        
        # Xử lý CORS để trình duyệt không chặn request preflight
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # 3. React SPA routing
    location / {
        try_files $uri /index.html;
    }

    error_page 404 /index.html;
}