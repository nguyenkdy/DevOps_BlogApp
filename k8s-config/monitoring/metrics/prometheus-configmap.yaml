apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - 'alertmanager:9093'

    rule_files:
      # - "alert-rules.yml" # Hiện tại comment lại, sau này bạn tạo file rules thì bỏ dấu # đi

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: node-exporter
        dns_sd_configs:
          - names:
              - node-exporter-headless.monitoring.svc.cluster.local
            type: A
            port: 9100
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - api-gateway.production.svc.cluster.local:8080

      - job_name: auth-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - auth-service.production.svc.cluster.local:9001

      - job_name: user-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - user-service.production.svc.cluster.local:9002

      - job_name: article-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - article-service.production.svc.cluster.local:9003

      - job_name: comment-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - comment-service.production.svc.cluster.local:9004