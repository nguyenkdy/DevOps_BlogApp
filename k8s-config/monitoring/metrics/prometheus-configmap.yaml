apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  # --- FILE 1: alert-rules.yml ---
  alert-rules.yml: |
    groups:
    - name: NodeAlerts
      rules:
      - alert: NodeCPUUsageHigh
        expr: (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Cảnh báo: CPU của Node {{ $labels.instance }} quá cao!"
          description: "CPU đang hoạt động ở mức {{ $value | printf \"%.2f\" }}% trong hơn 2 phút qua."

      - alert: NodeMemoryUsageHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Cảnh báo: RAM của Node {{ $labels.instance }} sắp hết!"
          description: "RAM đang sử dụng {{ $value | printf \"%.2f\" }}% công suất trong 2 phút qua."

    - name: MicroservicesAlerts
      rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Cảnh báo CRITICAL: Service {{ $labels.job }} đã ngừng hoạt động!"
          description: "Prometheus không thể kết nối tới {{ $labels.job }} tại địa chỉ {{ $labels.instance }} trong hơn 1 phút qua. Service có thể đã bị sập."
      - alert: ImmediateErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m])) by (job, instance) > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Cảnh báo: Service {{ $labels.job }} phát sinh lỗi 5xx!"
          description: "Phát hiện có lỗi server (5xx) tại {{ $labels.instance }}. Tần suất hiện tại: {{ $value | printf \"%.2f\" }} lỗi/giây."
      - alert: HighHttpTraffic
        expr: sum(rate(http_server_requests_seconds_count[2m])) by (job, instance) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Cảnh báo: Lượng truy cập vào {{ $labels.job }} tăng đột biến!"
          description: "Service {{ $labels.job }} ({{ $labels.instance }}) đang nhận {{ $value | printf \"%.0f\" }} requests/giây."

      - alert: HighLatency
        expr: sum(rate(http_server_requests_seconds_sum[3m])) by (job, instance) / sum(rate(http_server_requests_seconds_count[3m])) by (job, instance) > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Cảnh báo: Service {{ $labels.job }} phản hồi quá chậm!"
          description: "Thời gian phản hồi trung bình của {{ $labels.job }} ({{ $labels.instance }}) đang là {{ $value | printf \"%.2f\" }} giây."

  # --- FILE 2: prometheus.yml ---
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - 'alertmanager:9093'
    
    rule_files:
      - "/etc/prometheus/alert-rules.yml"

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: node-exporter
        dns_sd_configs:
          - names:
              - node-exporter-headless.monitoring.svc.cluster.local
            type: A
            port: 9100
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - api-gateway.production.svc.cluster.local:8080

      - job_name: auth-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - auth-service.production.svc.cluster.local:9001

      - job_name: user-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - user-service.production.svc.cluster.local:9002

      - job_name: article-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - article-service.production.svc.cluster.local:9003

      - job_name: comment-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - comment-service.production.svc.cluster.local:9004
