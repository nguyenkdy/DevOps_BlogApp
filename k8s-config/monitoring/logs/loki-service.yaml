apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
spec:
  type: ClusterIP
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
    - name: grpc
      port: 9096
      targetPort: 9096
---
apiVersion: v1
kind: Service
metadata:
  name: loki-external
  namespace: monitoring
  labels:
    app: loki
spec:
  type: LoadBalancer
  loadBalancerIP: 52.139.236.175
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
