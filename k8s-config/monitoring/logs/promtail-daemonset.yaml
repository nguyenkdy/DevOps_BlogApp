apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - operator: Exists

      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          args:
            - -config.file=/etc/promtail/promtail-config.yaml
            - -config.expand-env=true

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          ports:
            - containerPort: 9080
              name: http-metrics

          securityContext:
            runAsUser: 0

          volumeMounts:
            - name: config
              mountPath: /etc/promtail

            - name: run
              mountPath: /run/promtail

            # 🔥 CRITICAL (node logs)
            - name: varlog
              mountPath: /var/log
              readOnly: true

            # 🔥 CRITICAL (pod logs)
            - name: pods
              mountPath: /var/log/pods
              readOnly: true

            - name: containers
              mountPath: /var/log/containers
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: promtail-config

        - name: run
          emptyDir: {}

        - name: varlog
          hostPath:
            path: /var/log

        - name: pods
          hostPath:
            path: /var/log/pods

        - name: containers
          hostPath:
            path: /var/log/containers