apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki

  template:
    metadata:
      labels:
        app: loki

    spec:
      securityContext:
        fsGroup: 10001   # ✅ FIX quyền ghi PVC

      containers:
        - name: loki
          image: grafana/loki:2.9.3
          args:
            - -config.file=/etc/loki/loki.yaml

          ports:
            - containerPort: 3100

          volumeMounts:
            - name: config
              mountPath: /etc/loki

            - name: storage
              mountPath: /loki

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"

          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 20
            periodSeconds: 10

      volumes:
        - name: config
          configMap:
            name: loki-config

        - name: storage
          persistentVolumeClaim:
            claimName: loki-data