apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
  labels:
    app: promtail
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: node
          - action: replace
            separator: ;
            source_labels:
              - __meta_kubernetes_pod_label_app
              - __meta_kubernetes_pod_label_app_kubernetes_io_name
              - __meta_kubernetes_pod_controller_name
              - __meta_kubernetes_pod_name
            regex: ^;*([^;]+).*
            replacement: $1
            target_label: service
          - action: replace
            source_labels:
              - namespace
              - service
            separator: /
            target_label: job
          - action: replace
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            replacement: /var/log/pods/*$1/*.log
            target_label: __path__

      - job_name: node-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: node-logs
              service: node
              node: ${NODE_NAME}
              __path__: /var/log/*.log
          - targets:
              - localhost
            labels:
              job: node-logs
              service: node
              node: ${NODE_NAME}
              __path__: /var/log/syslog
          - targets:
              - localhost
            labels:
              job: node-logs
              service: node
              node: ${NODE_NAME}
              __path__: /var/log/messages
          - targets:
              - localhost
            labels:
              job: node-logs
              service: node
              node: ${NODE_NAME}
              __path__: /var/log/dmesg
