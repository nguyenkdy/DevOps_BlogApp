apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod

        pipeline_stages:
          # Parse log chuẩn Kubernetes container log
          - cri: {}

          # Gom log nhiều dòng, ví dụ Java Exception stacktrace
          - multiline:
              firstline: '^\d{4}-\d{2}-\d{2}.*\s(ERROR|WARN|INFO|DEBUG|TRACE)\s'
              max_wait_time: 3s

          # Tách trạng thái log: ERROR, WARN, INFO,...
          - regex:
              expression: '^(?P<time>\d{4}-\d{2}-\d{2}.*?)\s+(?P<level>ERROR|WARN|INFO|DEBUG|TRACE)\s+(?P<message>.*)'

          # Đưa level thành label để query trong Grafana
          - labels:
              level:

          # Nội dung log hiển thị chính là message
          - output:
              source: message

        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

          - source_labels:
              - __meta_kubernetes_pod_name
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_container_name
            separator: "_"
            replacement: /var/log/containers/$1-*.log
            target_label: __path__
