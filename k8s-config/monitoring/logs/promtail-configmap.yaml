apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        pipeline_stages:
          - cri: {}

        kubernetes_sd_configs:
          - role: pod

        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

          # Build __path__ theo từng bước để tránh regex conflict
          # Bước 1: tạo label trung gian pod_dir = <ns>_<podname>_<uid>
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_name
              - __meta_kubernetes_pod_uid
            separator: "_"
            target_label: __tmp_pod_dir

          # Bước 2: ghép pod_dir + container thành __path__
          # Dùng | làm separator — không bao giờ xuất hiện trong namespace/pod/uid/container name
          - action: replace
            source_labels:
              - __tmp_pod_dir
              - __meta_kubernetes_pod_container_name
            separator: "|"
            regex: "(.+)\\|(.+)"
            replacement: "/var/log/pods/$1/$2/*.log"
            target_label: __path__

          # Xoá label trung gian
          - action: labeldrop
            regex: __tmp_pod_dir

          # Chỉ scrape pods trên cùng node
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__

      - job_name: node-logs
        static_configs:
          - targets: [localhost]
            labels:
              job: node-logs
              log_type: node
              __path__: /var/log/syslog

      - job_name: node-kern-logs
        static_configs:
          - targets: [localhost]
            labels:
              job: node-kern-logs
              log_type: kernel
              __path__: /var/log/kern.log

      - job_name: node-auth-logs
        static_configs:
          - targets: [localhost]
            labels:
              job: node-auth-logs
              log_type: auth
              __path__: /var/log/auth.log
