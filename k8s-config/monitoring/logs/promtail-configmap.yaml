apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      # =========================
      # POD / SERVICE LOGS
      # =========================
      - job_name: kubernetes-pods
        pipeline_stages:
          - cri: {}

        kubernetes_sd_configs:
          - role: pod

        relabel_configs:
          - source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace

          - source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod

          - source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container

          - source_labels:
              - __meta_kubernetes_pod_label_app
            target_label: app

          - source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: node

          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_name
              - __meta_kubernetes_pod_container_name
            separator: _
            regex: (.*)_(.*)_(.*)
            replacement: /var/log/containers/*$2*$3*.log
            target_label: __path__

      # =========================
      # NODE SYSTEM LOGS
      # =========================
      - job_name: node-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: node-logs
              log_type: node
              __path__: /var/log/syslog

      - job_name: node-kern-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: node-kern-logs
              log_type: kernel
              __path__: /var/log/kern.log

      - job_name: node-auth-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: node-auth-logs
              log_type: auth
              __path__: /var/log/auth.log
