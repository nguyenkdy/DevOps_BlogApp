apiVersion: apps/v1
kind: Deployment
metadata:
  name: article-service
  namespace: production
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: article-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: article-service
  template:
    metadata:
      labels:
        app: article-service
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-db 5432; do echo waiting for postgres-db; sleep 2; done
      containers:
        - name: article-service
          image: khanhduy05/article-service:48
          imagePullPolicy: Always
          ports:
            - containerPort: 9003
          env:
            - name: SPRING_APPLICATION_NAME
              value: article-service
            - name: K8S_SERVICE_DNS
              value: article-service
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "true"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "true"
            - name: USER_SERVICE_URL
              value: http://user-service:9002
            - name: COMMENT_SERVICE_URL
              value: http://comment-service:9004
            - name: SPRING_CLOUD_DISCOVERY_ENABLED
              value: "true"
            - name: EUREKA_CLIENT_ENABLED
              value: "true"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-db:5432/articledb
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            # --- CẤU HÌNH OPENTELEMETRY ---
            - name: OTEL_SERVICE_NAME
              value: "article-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4318"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_TRACES_SAMPLER
              value: "traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 9003
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9003
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9003
            initialDelaySeconds: 60
            periodSeconds: 20
